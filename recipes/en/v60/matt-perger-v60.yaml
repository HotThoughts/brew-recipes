id: matt-perger-v60
name: Matt Perger V60
brewer: V60
dose_g: 12
water_ml: 200
ratio: "1:16.7"
water_temp_c: 97
grind_size: medium-fine
description: >
  Matt Perger's high-extraction V60 method from his 2013 championship work.
  Notable for aggressively stirring the bloom and grinding finer than typical
  pour-over recipes. Targets ~20.8% extraction.
phases:
  - label: Bloom
    water_g: 50
    wait_seconds: 30
    note: Stir vigorously in a cross-pattern to maximize saturation
  - label: Second Pour
    water_g: 50
    wait_seconds: 30
  - label: Final Pour
    water_g: 100
    wait_seconds: 0
    note: When water drains halfway, tap/swirl to flatten bed ("Rao spin")
source:
  name: Matt Perger
  url: https://www.youtube.com/watch?v=1oB1oDrDkHM
  competition: World Brewers Cup 2013
tags: [light-roast, competition, advanced]
