id: april-4-pour
name: April 4-Pour
brewer: April
dose_g: 17
water_ml: 250
ratio: "1:14.7"
water_temp_c: 92
grind_size: coarse
description: >
  Patrik Rolf's signature four-pour method for the April Brewer. Uses a coarse
  grind and moderate temperature. Each pour is timed: 70g bloom, then 100g,
  50g, and 30g with a final spin. The April Brewer's flat bottom and specific
  hole pattern produce a clean, sweet, and repeatable cup.
phases:
  - label: Bloom
    water_g: 70
    wait_seconds: 30
    note: Wet all grounds with a wide circular motion. No swirling during bloom.
  - label: Second Pour
    water_g: 100
    wait_seconds: 30
  - label: Third Pour
    water_g: 50
    wait_seconds: 30
  - label: Final Pour + Spin
    water_g: 30
    wait_seconds: 0
    note: After the 30g pour, lift the brewer slightly and give a gentle spin.
source:
  name: Patrik Rolf / April Coffee Roasters
  url: https://www.thegrumpyolive.com/coffee-101-how-to-brew-with-the-april-brewer/
tags: [light-roast, multi-pour, beginner-friendly, sweet]
