id: orea-o1-the-bypass
name: O1 The Bypass
brewer: Orea
variant: o1
dose_g: 18
water_ml: 290
ratio: '1:16.1'
water_temp_c: 96
grind_size: medium
description: Matteo D'Ottavio's bypass recipe for the O1 with Wave filter. Circular-to-central pours followed by 15–30g bypass water added to the brewed coffee. Less bypass for intensity, more for smoothness.
phases:
  - label: Bloom
    water_g: 60
    note: Circular pour, ending central
  - label: Second Pour
    water_g: 100
    wait_seconds: 40
    note: Circular then central at 4 G/S
  - label: Third Pour
    water_g: 100
    wait_seconds: 50
    note: Circular then central at 4 G/S
  - label: Bypass
    water_g: 30
    note: Add 15–30g water directly to brewed coffee, to taste
source:
  name: Matteo D'Ottavio / Orea UK
  url: https://www.orea.uk/guides-o1
tags:
  - light-roast
  - bypass
  - balanced
