id: orea-default
name: V3 Base Two
brewer: Orea
dose_g: 18
water_ml: 300
ratio: "1:16.7"
variant: v3
water_temp_c: 94
grind_size: medium
description: >
  The classic V3 pulse recipe with Wave filter. Four even spiral pours bring
  out balance in a bigger cup. Familiar if transitioning from V60 or Kalita.
phases:
  - label: Bloom
    water_g: 60
    note: Spiral pour to saturate evenly
  - label: Second Pour
    water_g: 80
    wait_seconds: 40
    note: Spiral pour
  - label: Third Pour
    water_g: 80
    wait_seconds: 40
    note: Spiral pour
  - label: Final Pour
    water_g: 80
    wait_seconds: 40
    note: Spiral pour
source:
  name: Orea UK
  url: https://www.orea.uk/guides-v3
tags: [light-roast, beginner-friendly, multi-pour, balanced]
