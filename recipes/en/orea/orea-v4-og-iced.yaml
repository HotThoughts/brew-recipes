id: orea-v4-og-iced
name: V4 OG Iced
brewer: Orea
variant: v4
dose_g: 18
water_ml: 160
ratio: '1:8.9'
water_temp_c: 92
grind_size: medium
description: An iced pour-over on the V4 Classic Bottom + Wave filter. Brew 160ml over 140g of ice in the carafe for a bright, fruity flash brew. Swirl and stir after brewing, let the ice dilute to taste.
phases:
  - label: Bloom
    water_g: 40
    note: Circular pour onto 140g ice in carafe
  - label: Second Pour
    water_g: 40
    wait_seconds: 30
    note: Circular pour
  - label: Third Pour
    water_g: 40
    wait_seconds: 20
    note: Circular pour
  - label: Final Pour
    water_g: 40
    wait_seconds: 30
    note: Circular pour
source:
  name: Orea UK
  url: https://www.orea.uk/guides-v4
tags:
  - light-roast
  - cold-brew
  - acidic
