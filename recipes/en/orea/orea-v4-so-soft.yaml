id: orea-v4-so-soft
name: V4 So Soft
brewer: Orea
variant: v4
dose_g: 16
water_ml: 250
ratio: '1:15.6'
water_temp_c: 92
grind_size: coarse
description: A conical recipe for the V4 Wide + Apex Bottom using Sibarist Fast Conical filter. Soft and clean results that work for many coffee types. The first pour starts circular then shifts central.
phases:
  - label: Bloom
    water_g: 50
    note: First 10g circular, remaining 40g central pour
  - label: Second Pour
    water_g: 50
    wait_seconds: 30
    note: Circular pour
  - label: Third Pour
    water_g: 100
    wait_seconds: 30
    note: Circular pour
  - label: Final Pour
    water_g: 50
    wait_seconds: 30
    note: Central pour
source:
  name: Mordy / Orea UK
  url: https://www.orea.uk/guides-v4
tags:
  - light-roast
  - balanced
  - multi-pour
