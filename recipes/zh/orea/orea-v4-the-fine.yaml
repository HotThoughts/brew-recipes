description: 适合甜美、有力的水洗咖啡的双注水配方。闷蒸后以 4 G/S 缓慢长注水。使用 Wave 滤纸效果最佳；Flat + Negotiator 需研磨稍粗。不建议用于日晒或发酵处理的咖啡豆。
