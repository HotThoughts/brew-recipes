    note: 绕圈注水，6 G/S
  - label: 第三段注水
    water_g: 150
    wait_seconds: 45
    note: 绕圈注水，6 G/S
  - label: 最终注水
    water_g: 150
    wait_seconds: 45
    note: 绕圈注水，6 G/S
