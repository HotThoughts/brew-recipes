id: april-4-pour
name: April 四段注水
brewer: April
dose_g: 17
water_ml: 250
ratio: "1:14.7"
variant: standard
water_temp_c: 92
grind_size: coarse
description: >
  The Grumpy Olive 的 April Brewer 四段注水配方。采用粗研磨和中等水温。
  每段注水严格计时：闷蒸 70g，然后 100g、50g、30g，最后旋转收尾。
  April 滤杯的平底设计和特定开孔排列可带来干净、甜美且高重复性的一杯。
phases:
  - label: 闷蒸
    water_g: 70
    wait_seconds: 30
    note: 用大范围绕圈动作浸润所有咖啡粉。闷蒸期间不旋转。
  - label: 第二段注水
    water_g: 100
    wait_seconds: 30
  - label: 第三段注水
    water_g: 50
    wait_seconds: 30
  - label: 最后一段注水 + 旋转
    water_g: 30
    wait_seconds: 0
    note: 注入 30g 后，轻轻提起滤杯做一个轻柔的旋转。
source:
  name: The Grumpy Olive
  url: https://www.thegrumpyolive.com/coffee-101-how-to-brew-with-the-april-brewer/
tags: [light-roast, multi-pour, beginner-friendly, sweet]
