id: hoffmann-1-cup-v60
name: Hoffmann 单人份 V60
brewer: V60
dose_g: 15
water_ml: 250
ratio: "1:16.7"
variant: 1-cup
water_temp_c: 100
grind_size: medium-fine
description: >
  James Hoffmann 精炼的单杯 V60 技法。使用沸水和分段注水，每段注水之间
  轻柔旋转。粉床中的凹坑和最后的旋转确保均匀萃取。
phases:
  - label: 闷蒸
    water_g: 50
    wait_seconds: 45
    note: 绕圈注水。0:10-0:15 时轻柔旋转，将粘在壁上的咖啡粉冲下
  - label: 第二段注水
    water_g: 50
    wait_seconds: 10
    note: 绕圈注水
  - label: 第三段注水
    water_g: 50
    wait_seconds: 10
    note: 绕圈注水
  - label: 第四段注水
    water_g: 50
    wait_seconds: 10
    note: 绕圈注水
  - label: 最后一段注水
    water_g: 50
    wait_seconds: 0
    note: 绕圈注水。轻柔旋转使粉床平整，让其自然流完
source:
  name: James Hoffmann
  url: https://www.youtube.com/watch?v=1oB1oDrDkHM
tags: [light-roast, beginner-friendly, multi-pour, balanced]
